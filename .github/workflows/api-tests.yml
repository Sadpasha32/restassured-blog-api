name: API tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      suite:
        description: "Какой набор тестов прогнать"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - regression
          - e2e
          - all
      base_url:
        description: "Базовый URL стенда"
        required: true
        default: "http://localhost:3000"

env:
  JAVA_VERSION: "17"
  DEFAULT_BASE_URL: "http://localhost:3000"

jobs:
  api-smoke:
    name: API smoke
    if: github.event_name != 'workflow_dispatch'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Run API smoke tests
        run: mvn -B -P smoke test '-Dtest=BlogApiHomeworkTest,AuthorizedApiExamplesTest' '-Dbase.url=${{ env.DEFAULT_BASE_URL }}'
      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-smoke
          path: target/surefire-reports

  api-regression:
    name: API regression
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: self-hosted
    needs: api-smoke
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Run API regression tests
        run: mvn -B -P regression test '-Dtest=BlogApiHomeworkTest,AuthorizedApiExamplesTest' '-Dbase.url=${{ env.DEFAULT_BASE_URL }}'
      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-regression
          path: target/surefire-reports

  ui-e2e:
    name: UI + E2E (Chrome)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: self-hosted
    needs: api-regression
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Run E2E (API + UI) tests
        run: mvn -B -P e2e test '-Dbase.url=${{ env.DEFAULT_BASE_URL }}' '-Dselenide.headless=true'
      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-e2e
          path: target/surefire-reports

  manual:
    name: Manual run (${{ github.event.inputs.suite }})
    if: github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Run ${{ github.event.inputs.suite }}
        run: mvn -B -P ${{ github.event.inputs.suite }} test '-Dbase.url=${{ github.event.inputs.base_url }}' '-Dselenide.headless=true'
      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ github.event.inputs.suite }}
          path: target/surefire-reports
